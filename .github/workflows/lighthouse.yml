name: Lighthouse CI

on:
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  lighthouse:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - name: Wait for Vercel Preview
        uses: patrickedqvist/wait-for-vercel-preview@v1.3.1
        id: vercel-preview
        continue-on-error: true
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          max_timeout: 300
          check_interval: 10

      - name: Skip if no Vercel preview
        if: steps.vercel-preview.outcome != 'success'
        run: echo "Vercel preview 없음 또는 접근 불가 — Lighthouse 스킵"

      - name: Run Lighthouse CI
        if: steps.vercel-preview.outcome == 'success'
        uses: treosh/lighthouse-ci-action@v12
        id: lighthouse
        with:
          urls: ${{ steps.vercel-preview.outputs.url }}
          uploadArtifacts: true
          temporaryPublicStorage: true
          configPath: .lighthouserc.json

      - name: Comment Lighthouse results
        if: steps.vercel-preview.outcome == 'success'
        uses: actions/github-script@v7
        with:
          script: |
            const results = ${{ steps.lighthouse.outputs.manifest }};
            const summary = results[0]?.summary;
            if (!summary) return;

            const score = (v) => Math.round(v * 100);
            const icon = (v) => v >= 0.9 ? '🟢' : v >= 0.5 ? '🟡' : '🔴';

            const body = [
              '## Lighthouse 점수',
              '',
              `| 항목 | 점수 |`,
              `|---|---|`,
              `| ${icon(summary.performance)} Performance | ${score(summary.performance)} |`,
              `| ${icon(summary.accessibility)} Accessibility | ${score(summary.accessibility)} |`,
              `| ${icon(summary['best-practices'])} Best Practices | ${score(summary['best-practices'])} |`,
              `| ${icon(summary.seo)} SEO | ${score(summary.seo)} |`,
              '',
              `🔗 [전체 리포트](${{ steps.lighthouse.outputs.links }})`,
            ].join('\n');

            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
