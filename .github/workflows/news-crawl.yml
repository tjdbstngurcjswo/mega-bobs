name: News Crawl

# Vercel Hobby 플랜 cron 제약(하루 1회·최대 2개·시각 부정확)을 피하기 위해
# 메가존 소식 크롤은 GitHub Actions 스케줄로 트리거한다.
# 배포된 /api/news/crawl 엔드포인트를 Bearer 인증으로 호출할 뿐, 크롤 자체는 서버에서 실행된다.
#
# 필요한 설정 (Settings > Secrets and variables > Actions):
#   - secret  CRON_SECRET : /api/news/crawl 인증 토큰 (Vercel 환경변수와 동일 값)
#   - variable SITE_URL    : 배포 URL (예: https://megabobs.com)

on:
  schedule:
    - cron: '0 23 * * *' # 23:00 UTC = 08:00 KST (매일 아침)
  workflow_dispatch: # 수동 실행 허용

jobs:
  crawl:
    runs-on: ubuntu-latest
    steps:
      - name: Trigger news crawl
        env:
          SITE_URL: ${{ vars.SITE_URL }}
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          status=$(curl -sS -o /tmp/body.json -w '%{http_code}' \
            --max-time 60 --retry 3 --retry-delay 5 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "${SITE_URL%/}/api/news/crawl")
          echo "HTTP $status"
          cat /tmp/body.json
          echo
          test "$status" = "200"
