name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]
  issue_comment:
    types: [created]

jobs:
  claude-review:
    if: |
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request &&
       contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@beta
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          # PR에서 @claude 멘션으로 직접 질문도 가능
          direct_prompt: |
            이 PR의 변경 사항을 코드 리뷰해 주세요.
            다음 기준으로 검토해 주세요:
            1. 버그 또는 잠재적 오류
            2. 보안 취약점 (XSS, SQL Injection 등)
            3. 타입 안전성 (TypeScript)
            4. 성능 이슈
            5. 프로젝트 컨벤션 위반 (CLAUDE.md 기준)
            6. DESIGN.md 토큰·규칙 위반 (UI 변경 시)
            문제가 없으면 "✅ 코드 리뷰 통과" 로 마무리해 주세요.
