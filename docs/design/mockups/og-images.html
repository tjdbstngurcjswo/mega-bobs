<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>megabobs — OG 공유 이미지 (1200×630)</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<link rel="stylesheet" href="shared.css">
<script src="https://mcp.figma.com/mcp/html-to-design/capture.js" async></script>
<style>
  body{width:1440px;padding:48px 0 64px}
  .col{display:flex;flex-direction:column;gap:40px;align-items:center}
  .og-label{font-size:12px;font-weight:800;letter-spacing:.1em;color:#A0A0A0;margin-bottom:10px;text-align:center}
  .og{width:1200px;height:630px;border-radius:0;overflow:hidden;position:relative;box-shadow:var(--shadow)}

  /* OG 1 — 기본 (사이트 전체) */
  .og-main{background:linear-gradient(135deg,#F5F5F3 0%,#ECECEA 100%);display:flex;align-items:center;padding:0 90px}
  .og-main .left{flex:1}
  .og-main .brand{display:flex;align-items:center;gap:14px;margin-bottom:36px}
  .og-main .bowl-lg{width:20px;height:20px;background:var(--primary)}
  .og-main .brand b{font-size:36px;font-weight:800;letter-spacing:-.02em}
  .og-main h1{font-size:60px;font-weight:900;letter-spacing:-.02em;line-height:1.4}
  .og-main h1 em{font-style:normal;color:var(--primary-deep)}
  .og-main p{margin-top:22px;font-size:25px;color:var(--ink-2)}
  .og-main .deco{font-size:300px;font-weight:900;color:#E2C04C;transform:none;filter:none;line-height:1}
  .og-main .pattern{position:absolute;right:-40px;top:-50px;width:340px;height:340px;background:#FAF4D9;z-index:0}
  .og-main .left,.og-main .deco{position:relative;z-index:1}

  /* OG 2 — 게임 결과 */
  .og-game{background:linear-gradient(135deg,#E8CC6A 0%,#E2C04C 60%,#C2A02E 100%);display:flex;flex-direction:column;align-items:center;justify-content:center;color:#111111;text-align:center}
  .og-game .conf{position:absolute;inset:0;background:
    radial-gradient(circle 7px at 12% 22%, #FFD66B 99%, transparent),
    radial-gradient(circle 5px at 26% 70%, #FFF 99%, transparent),
    radial-gradient(circle 6px at 78% 18%, #FFD66B 99%, transparent),
    radial-gradient(circle 5px at 88% 60%, #FFF 99%, transparent),
    radial-gradient(circle 7px at 60% 85%, #FFD66B 99%, transparent),
    radial-gradient(circle 4px at 42% 12%, #FFF 99%, transparent);opacity:.7}
  .og-game .crown{margin-bottom:6px}
  .og-game h1{font-size:60px;font-weight:900;letter-spacing:-.01em;margin-top:14px}
  .og-game h1 .name{padding:0 18px;background:rgba(255,255,255,.38);border-radius:0}
  .og-game p{margin-top:20px;font-size:25px;opacity:.92}
  .og-game .site{position:absolute;bottom:38px;display:flex;align-items:center;gap:11px;font-size:21px;font-weight:800}
  .og-game .site .bowl-sm{width:36px;height:36px;border-radius:0;background:#111111;display:flex;align-items:center;justify-content:center;font-size:19px}
</style>
</head>
<body>
<div class="col">
  <div>
    <div class="og-label">OG 기본 — 전 페이지 공통 (1200×630)</div>
    <div class="og og-main">
      <div class="pattern"></div>
      <div class="left">
        <div class="brand"><span class="bowl-lg"></span><b>메가밥스</b></div>
        <h1>오늘 점심,<br><em>뭐 먹을지</em> 정해드려요</h1>
        <p>구내식당 메뉴 · 투표 · 내기 게임 · 지정타 맛집</p>
      </div>
      <div class="deco">?</div>
    </div>
  </div>

  <div>
    <div class="og-label">OG 게임 결과 — 슬랙 공유용 (1200×630)</div>
    <div class="og og-game">
      <div class="conf"></div>
      <div class="crown" style="font-size:24px;font-weight:900;letter-spacing:.5em;color:#111111">WINNER</div>
      <h1>오늘 커피는 <span class="name">도윤</span>님이 쏩니다!</h1>
      <p>🎰 슬롯머신 · 참가 4명 — 다음 판 도전은 megabobs.com</p>
      <div class="site">megabobs.com/games</div>
    </div>
  </div>
</div>
<a href="index.html" style="position:fixed;left:18px;bottom:18px;z-index:9999;font-family:Pretendard,sans-serif;font-size:12.5px;font-weight:800;color:#fff;background:#111111;padding:9px 14px;border-radius:0;text-decoration:none;box-shadow:0 4px 14px rgba(0,0,0,.25)">📋 화면 목록</a></body>
</html>
